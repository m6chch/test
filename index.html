<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATE MUSIC PLAYER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --accent-color: #00d2ff;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center;
            background: var(--bg-gradient); font-family: 'Segoe UI', Roboto, sans-serif; color: var(--text-main);
            overflow: hidden;
        }

        .player-card {
            width: 900px; height: 600px; background: var(--glass-bg); backdrop-filter: blur(20px);
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); display: flex;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); overflow: hidden;
            animation: fadeIn 1s ease-out;
        }

        /* 左側：ジャケット・コントロール */
        .player-left {
            flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center;
            background: rgba(0,0,0,0.2);
        }

        .cover-area {
            width: 280px; height: 280px; border-radius: 20px; position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); margin-bottom: 30px;
            overflow: hidden; transition: transform 0.3s ease;
        }
        .cover-area.playing { animation: pulse 2s infinite ease-in-out; }
        .cover-image { width: 100%; height: 100%; object-fit: cover; }

        .info-area { text-align: center; margin-bottom: 20px; width: 100%; }
        .info-area h1 { font-size: 24px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info-area p { color: var(--accent-color); margin: 5px 0; font-weight: bold; }

        /* 右側：歌詞エリア */
        .player-right { flex: 1.2; padding: 40px; display: flex; flex-direction: column; }
        .lyrics-container {
            flex: 1; overflow-y: auto; padding-right: 15px; scroll-behavior: smooth;
            mask-image: linear-gradient(transparent, black 10%, black 90%, transparent);
        }
        .lyrics-container::-webkit-scrollbar { width: 4px; }
        .lyrics-container::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }
        
        .lyrics-content { font-size: 18px; line-height: 2; color: var(--text-sub); transition: 0.3s; }
        .lyrics-line.active { color: #fff; font-size: 20px; font-weight: bold; text-shadow: 0 0 15px var(--accent-color); }

        /* コントロール UI */
        .progress-container { width: 100%; margin-bottom: 20px; }
        .progress-bar {
            width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px;
            cursor: pointer; position: relative; appearance: none; outline: none;
        }
        .progress-bar::-webkit-slider-thumb { appearance: none; width: 14px; height: 14px; background: var(--accent-color); border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px var(--accent-color); }

        .time-display { display: flex; justify-content: space-between; font-size: 12px; margin-top: 8px; }

        .main-controls { display: flex; align-items: center; gap: 25px; }
        .btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 20px; transition: 0.3s; }
        .btn:hover { color: var(--accent-color); transform: scale(1.1); }
        .btn.play-pause { width: 60px; height: 60px; background: var(--accent-color); border-radius: 50%; font-size: 24px; color: #000; }
        .btn.active { color: var(--accent-color); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    </style>
</head>
<body>

<div class="player-card">
    <div class="player-left">
        <div class="cover-area" id="cover-box">
            <img id="cover-art" src="" alt="Jacket" class="cover-image">
        </div>
        <div class="info-area">
            <h1 id="title">Music Player</h1>
            <p id="artist">Ready to Play</p>
        </div>
        
        <div class="progress-container">
            <input type="range" id="progress" class="progress-bar" value="0">
            <div class="time-display">
                <span id="current">0:00</span>
                <span id="total">0:00</span>
            </div>
        </div>

        <div class="main-controls">
            <button class="btn" id="shuffle" title="Shuffle"><i class="fas fa-random"></i></button>
            <button class="btn" onclick="prevSong()"><i class="fas fa-step-backward"></i></button>
            <button class="btn play-pause" id="play-btn" onclick="togglePlay()"><i class="fas fa-play"></i></button>
            <button class="btn" onclick="nextSong()"><i class="fas fa-step-forward"></i></button>
            <button class="btn" id="repeat" title="Repeat"><i class="fas fa-redo"></i></button>
        </div>
    </div>

    <div class="player-right">
        <h3>Lyrics</h3>
        <div class="lyrics-container" id="lyrics-scroll">
            <div class="lyrics-content" id="lyrics-display">再生を開始してください</div>
        </div>
    </div>
</div>

<audio id="audio"></audio>

<script>
    // GitHub環境用に、すべてのデータをこの中で定義
    const songs = [
        { 
            file: "music/01 鬼ノ宴.mp3", 
            title: "01 鬼ノ宴", 
            artist: "友成空",
            cover: "https://i.ytimg.com/vi/NFzyrPK9rtM/sddefault.jpg",
            lyrics: "何処から喰へば良いものか<br>美味いものか不味いものか<br>其処退け此処退け鬼が通る<br>さあさあ、鬼ノ宴の始まりだ"
        },
        { 
            file: "music/02 #あくあ色ぱれっと.mp3", 
            title: "02 #あくあ色ぱれっと", 
            artist: "湊あくあ",
            cover: "https://i.ytimg.com/vi/uY_mZInZiaU/hqdefault.jpg",
            lyrics: "何をしても不器用で何かとミスしてばっか<br>それでも君は笑って「大丈夫だよ」って言ってくれたね<br>描いていくよ、あくあ色ぱれっと<br>君との思い出を一つずつ"
        },
        { 
            file: "music/03 ビビデバ.mp3", 
            title: "03 ビビデバ", 
            artist: "星街すいせい",
            cover: "https://i.ytimg.com/vi/8ZP5eqm4JqM/hqdefault.jpg",
            lyrics: "つまらないデイズもう散々ね！<br>人生は一瞬にして溶ける魔法<br>おしゃまな馬車 飛び乗ってDRIVIN'<br>BIBBIDI BOBBIDI BOOWA"
        }
    ];

    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('play-btn');
    const progress = document.getElementById('progress');
    const lyricsDisplay = document.getElementById('lyrics-display');
    const coverArt = document.getElementById('cover-art');
    const coverBox = document.getElementById('cover-box');

    let currentIdx = 0;
    let isPlaying = false;

    function loadSong(idx) {
        const song = songs[idx];
        document.getElementById('title').textContent = song.title;
        document.getElementById('artist').textContent = song.artist;
        coverArt.src = song.cover;
        
        // 【重要】# などの記号を安全に読み込むためのエンコード
        const encodedFile = song.file.split('/').map(part => encodeURIComponent(part)).join('/');
        audio.src = encodedFile;

        // 歌詞の構築
        lyricsDisplay.innerHTML = song.lyrics.split('<br>').map(line => `<div class="lyrics-line">${line}</div>`).join('');
        
        if (isPlaying) audio.play();
    }

    function togglePlay() {
        if (audio.paused) {
            audio.play();
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            coverBox.classList.add('playing');
        } else {
            audio.pause();
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
            coverBox.classList.remove('playing');
        }
    }

    function nextSong() {
        currentIdx = (currentIdx + 1) % songs.length;
        loadSong(currentIdx);
        audio.play();
    }

    function prevSong() {
        currentIdx = (currentIdx - 1 + songs.length) % songs.length;
        loadSong(currentIdx);
        audio.play();
    }

    audio.ontimeupdate = () => {
        const p = (audio.currentTime / audio.duration) * 100;
        progress.value = p || 0;
        document.getElementById('current').textContent = formatTime(audio.currentTime);
        document.getElementById('total').textContent = formatTime(audio.duration);

        // 簡易歌詞ハイライト
        const lines = document.querySelectorAll('.lyrics-line');
        const activeLineIdx = Math.floor((audio.currentTime / audio.duration) * lines.length);
        lines.forEach((l, i) => {
            l.classList.toggle('active', i === activeLineIdx);
            if(i === activeLineIdx) l.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });
    };

    progress.oninput = () => {
        const time = (progress.value / 100) * audio.duration;
        audio.currentTime = time;
    };

    function formatTime(sec) {
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    // 初回読み込み
    loadSong(0);
</script>

</body>
</html>
