<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M Music</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent: #ff4e91;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; background-color: var(--bg-color); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; height: 100vh; overflow: hidden;
        }

        .player-container {
            width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column;
            padding: 15px 20px 20px; background: linear-gradient(180deg, #2a2a2a 0%, #121212 100%);
        }

        /* 検索バーのデザイン */
        .search-container { position: relative; width: 100%; margin-bottom: 15px; z-index: 100; }
        .search-bar { 
            width: 100%; padding: 12px 15px 12px 40px; border-radius: 20px; border: none; 
            background: rgba(0,0,0,0.4); color: #fff; font-size: 14px; outline: none; 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .search-bar::placeholder { color: #888; }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-sub); }
        .search-results { 
            position: absolute; top: 100%; left: 0; width: 100%; background: var(--card-bg); 
            border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.8); margin-top: 5px; 
            max-height: 250px; overflow-y: auto; display: none; padding: 0; list-style: none; border: 1px solid rgba(255,255,255,0.1);
        }
        .search-results li { 
            padding: 10px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; 
            display: flex; align-items: center; gap: 12px; transition: 0.2s;
        }
        .search-results li:hover { background: rgba(255,255,255,0.1); }
        .search-results img { width: 40px; height: 40px; border-radius: 5px; object-fit: cover; }
        .search-info { display: flex; flex-direction: column; }
        .search-title { font-size: 14px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        .search-artist { font-size: 11px; color: var(--accent); }

        .header { display: flex; flex-direction: column; align-items: center; }
        .cover-box {
            width: 55vw; height: 55vw; max-width: 200px; max-height: 200px;
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1);
        }
        .cover-box img { width: 100%; height: 100%; object-fit: cover; }

        .info { text-align: center; width: 100%; margin-bottom: 15px; }
        .info h1 { font-size: 18px; margin: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .info p { font-size: 14px; color: var(--accent); margin: 5px 0 0; }

        .lyrics-wrap {
            flex: 1; overflow-y: auto; background: rgba(0,0,0,0.2);
            border-radius: 15px; padding: 20px; margin-bottom: 20px;
            line-height: 1.8; font-size: 15px; text-align: center;
        }

        .controls-wrap { background: var(--card-bg); border-radius: 20px; padding: 15px 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.3); }
        .progress-area { width: 100%; margin-bottom: 10px; }
        .seek-bar {
            width: 100%; height: 5px; appearance: none; background: #444;
            border-radius: 5px; outline: none; cursor: pointer;
        }
        .seek-bar::-webkit-slider-thumb { appearance: none; width: 12px; height: 12px; background: #fff; border-radius: 50%; }

        .time-box { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-sub); margin-top: 5px; }

        .btns { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px; }
        .btn { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .btn-main { width: 60px; height: 60px; background: #fff; color: #000; border-radius: 50%; font-size: 24px; }
        .active { color: var(--accent); }
    </style>
</head>
<body>

<div class="player-container">
    <!-- 検索バー領域 -->
    <div class="search-container">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="search-input" class="search-bar" placeholder="曲名やアーティストで検索...">
        <ul id="search-results" class="search-results"></ul>
    </div>

    <div class="header">
        <div class="cover-box">
            <img id="cover" src="" alt="jacket">
        </div>
        <div class="info">
            <h1 id="title">Loading...</h1>
            <p id="artist">---</p>
        </div>
    </div>

    <div class="lyrics-wrap" id="scroll-area">
        <div id="lyrics-display">データを読み込み中...</div>
    </div>

    <div class="controls-wrap">
        <div class="progress-area">
            <input type="range" id="seek" class="seek-bar" value="0">
            <div class="time-box">
                <span id="current">0:00</span>
                <span id="total">0:00</span>
            </div>
        </div>

        <div class="btns">
            <button class="btn" id="shuffle" onclick="toggleShuffle()"><i class="fas fa-random"></i></button>
            <button class="btn" onclick="prevSong()"><i class="fas fa-step-backward"></i></button>
            <button class="btn btn-main" id="play" onclick="togglePlay()"><i class="fas fa-play"></i></button>
            <button class="btn" onclick="nextSong()"><i class="fas fa-step-forward"></i></button>
            <button class="btn" id="repeat" onclick="toggleRepeat()"><i class="fas fa-redo-alt"></i></button>
        </div>
    </div>
</div>

<audio id="audio"></audio>

<script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('play');
    const seekBar = document.getElementById('seek');
    
    // 検索用エレメント
    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');
    
    let lyricsData = {}; 
    let songKeys = [];   
    let currentIdx = 0;
    let isShuffle = false;
    let isRepeat = false;
    let shuffleQueue = [];

    // JSONデータの読み込み
    async function init() {
        try {
            const response = await fetch('lyrics_data.json');
            lyricsData = await response.json();
            songKeys = Object.keys(lyricsData); 
            
            if (songKeys.length > 0) {
                loadSong(0);
            }
        } catch (e) {
            document.getElementById('lyrics-display').innerText = "lyrics_data.json の読み込みに失敗しました。";
        }
    }

    // 検索機能の処理
    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        searchResults.innerHTML = '';
        
        if (query === '') {
            searchResults.style.display = 'none';
            return;
        }

        // タイトルまたはアーティスト名で絞り込み
        const matches = songKeys.filter(key => {
            const data = lyricsData[key];
            const titleMatch = key.toLowerCase().includes(query);
            const artistMatch = (data.artist || "").toLowerCase().includes(query);
            return titleMatch || artistMatch;
        });

        if (matches.length > 0) {
            matches.forEach(key => {
                const data = lyricsData[key];
                const li = document.createElement('li');
                li.innerHTML = `
                    <img src="${data.icon}" alt="icon">
                    <div class="search-info">
                        <span class="search-title">${key}</span>
                        <span class="search-artist">${data.artist || 'Unknown Artist'}</span>
                    </div>
                `;
                
                // 検索結果をタップした時の処理
                li.onclick = () => {
                    currentIdx = songKeys.indexOf(key); // 元のリストから何番目か探す
                    loadSong(currentIdx);
                    audio.play();
                    playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                    searchResults.style.display = 'none'; // リストを閉じる
                    searchInput.value = ''; // バーをリセット
                    searchInput.blur(); // キーボードを閉じる
                };
                searchResults.appendChild(li);
            });
            searchResults.style.display = 'block';
        } else {
            searchResults.style.display = 'none';
        }
    });

    // 検索結果以外をタップしたらリストを閉じる
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-container')) {
            searchResults.style.display = 'none';
        }
    });

    function loadSong(idx) {
        const titleKey = songKeys[idx];
        const data = lyricsData[titleKey];
        const artistName = data.artist || "Unknown Artist";
        
        document.getElementById('title').textContent = titleKey;
        document.getElementById('artist').textContent = artistName;
        document.getElementById('cover').src = data.icon;
        document.getElementById('lyrics-display').innerHTML = data.text;
        
        const encodedPath = data.file.split('/').map(p => encodeURIComponent(p)).join('/');
        audio.src = encodedPath;
        
        document.getElementById('scroll-area').scrollTop = 0;

        // Media Session API
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: titleKey,
                artist: artistName,
                album: 'Ultimate Music Player',
                artwork: [
                    { src: data.icon, sizes: '96x96', type: 'image/jpeg' },
                    { src: data.icon, sizes: '128x128', type: 'image/jpeg' },
                    { src: data.icon, sizes: '192x192', type: 'image/jpeg' },
                    { src: data.icon, sizes: '256x256', type: 'image/jpeg' },
                    { src: data.icon, sizes: '384x384', type: 'image/jpeg' },
                    { src: data.icon, sizes: '512x512', type: 'image/jpeg' }
                ]
            });
        }
    }

    function togglePlay() {
        if (audio.src) {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
            }
        }
    }

    function getNextShuffleIdx() {
        if (shuffleQueue.length === 0) {
            shuffleQueue = songKeys.map((_, i) => i).filter(i => i !== currentIdx);
            for (let i = shuffleQueue.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffleQueue[i], shuffleQueue[j]] = [shuffleQueue[j], shuffleQueue[i]];
            }
        }
        return shuffleQueue.shift();
    }

    function nextSong() {
        if (isRepeat) {
            audio.currentTime = 0;
            audio.play();
            return;
        }

        if (isShuffle) {
            currentIdx = getNextShuffleIdx();
        } else {
            currentIdx = (currentIdx + 1) % songKeys.length;
        }
        loadSong(currentIdx);
        audio.play();
        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
    }

    function prevSong() {
        if (isRepeat) {
            audio.currentTime = 0;
            audio.play();
            return;
        }

        currentIdx = (currentIdx - 1 + songKeys.length) % songKeys.length;
        loadSong(currentIdx);
        audio.play();
        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
    }

    function toggleShuffle() {
        isShuffle = !isShuffle;
        document.getElementById('shuffle').classList.toggle('active', isShuffle);
        if (isShuffle) shuffleQueue = [];
    }

    function toggleRepeat() {
        isRepeat = !isRepeat;
        document.getElementById('repeat').classList.toggle('active', isRepeat);
    }

    audio.ontimeupdate = () => {
        const p = (audio.currentTime / audio.duration) * 100;
        seekBar.value = p || 0;
        document.getElementById('current').textContent = formatTime(audio.currentTime);
        document.getElementById('total').textContent = formatTime(audio.duration);
    };

    seekBar.oninput = () => {
        const time = (seekBar.value / 100) * audio.duration;
        audio.currentTime = time;
    };

    audio.onended = () => {
        if (isRepeat) {
            audio.currentTime = 0;
            audio.play();
        } else {
            nextSong();
        }
    };

    function formatTime(s) {
        if (isNaN(s)) return "0:00";
        const m = Math.floor(s / 60);
        const sc = Math.floor(s % 60);
        return `${m}:${sc < 10 ? '0' : ''}${sc}`;
    }

    if ('mediaSession' in navigator) {
        navigator.mediaSession.setActionHandler('play', () => {
            audio.play();
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        });
        navigator.mediaSession.setActionHandler('pause', () => {
            audio.pause();
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
        });
        navigator.mediaSession.setActionHandler('previoustrack', () => { prevSong(); });
        navigator.mediaSession.setActionHandler('nexttrack', () => { nextSong(); });
    }

    init();
</script>

</body>
</html>
